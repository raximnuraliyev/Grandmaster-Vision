services:
  # Backend API (ASP.NET Core)
  api:
    build:
      context: .
      dockerfile: src/Backend/GrandmasterVision.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - VisionService__BaseUrl=http://vision:8000
    depends_on:
      - vision

  # Vision Service (Python FastAPI)
  vision:
    build:
      context: .
      dockerfile: src/VisionService/Dockerfile
    ports:
      - "8000:8000"

  # Frontend (Blazor WASM - served by nginx)
  frontend:
    build:
      context: .
      dockerfile: src/Frontend/GrandmasterVision.Client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
